<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customers — Test-E</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div id="app" style="display:none">
    <div id="sidebar-container"></div>
    <main class="main-content">
        <div class="page-header">
            <div>
                <div class="page-title">Customers</div>
                <div class="page-subtitle">Customer database</div>
            </div>
            <button class="btn btn-primary" onclick="openModal('add-customer-modal')">＋ Add Customer</button>
        </div>

        <div class="filter-bar mb-4">
            <input type="text" id="search-phone" placeholder="🔍 Search by name or phone..."
                   class="search-input form-group" style="background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);width:280px"
                   oninput="filterCustomers(this.value)">
        </div>

        <div class="table-container">
            <table>
                <thead><tr><th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Joined</th></tr></thead>
                <tbody id="customers-body">
                    <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<!-- Add Customer Modal -->
<div class="modal-overlay" id="add-customer-modal">
    <div class="modal" style="width:380px">
        <div class="modal-header">
            <span class="modal-title">Add Customer</span>
            <button class="modal-close" onclick="closeModal('add-customer-modal')">✕</button>
        </div>
        <div class="form-group"><label>Full Name *</label><input type="text" id="c-name" placeholder="Rahul Sharma"></div>
        <div class="form-group"><label>Phone *</label><input type="text" id="c-phone" placeholder="9876543210"></div>
        <div class="form-group"><label>Email</label><input type="email" id="c-email" placeholder="email@example.com"></div>
        <div class="flex gap-2 mt-4">
            <button class="btn btn-primary" onclick="addCustomer()">Add Customer</button>
            <button class="btn btn-outline" onclick="closeModal('add-customer-modal')">Cancel</button>
        </div>
    </div>
</div>

<div id="toast"></div>
<script src="../../api.js"></script>
<script>
let allCustomers = [];

(async () => {
    await requireAuth();
    document.getElementById('sidebar-container').innerHTML = renderSidebar('customers');
    document.getElementById('app').style.display = 'flex';
    allCustomers = await api.get('/customers');
    renderCustomers(allCustomers);
})();

function renderCustomers(list) {
    const body = document.getElementById('customers-body');
    if (!list.length) { body.innerHTML = '<tr><td colspan="5" class="empty-state">No customers found</td></tr>'; return; }
    body.innerHTML = list.map((c,i) => `
        <tr>
            <td class="text-muted">${i+1}</td>
            <td><strong>${c.full_name}</strong></td>
            <td>${c.phone}</td>
            <td class="text-muted">${c.email || '—'}</td>
            <td class="text-muted">${new Date(c.created_at).toLocaleDateString('en-IN')}</td>
        </tr>
    `).join('');
}

function filterCustomers(q) {
    if (!q) { renderCustomers(allCustomers); return; }
    q = q.toLowerCase();
    renderCustomers(allCustomers.filter(c =>
        c.full_name.toLowerCase().includes(q) || c.phone.includes(q)
    ));
}

async function addCustomer() {
    const name  = document.getElementById('c-name').value.trim();
    const phone = document.getElementById('c-phone').value.trim();
    const email = document.getElementById('c-email').value.trim();
    if (!name || !phone) return showToast('Name and phone are required', true);
    await api.post('/customers', { full_name: name, phone, email: email || null });
    showToast('Customer added!');
    closeModal('add-customer-modal');
    allCustomers = await api.get('/customers');
    renderCustomers(allCustomers);
}
</script>
</body>
</html>
